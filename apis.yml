aid: bright-data
name: Bright Data
description: >-
  Bright Data is an all-in-one web data platform providing proxy networks,
  scraping browser automation, web scraper APIs, and dataset delivery
  services for large-scale web data collection and aggregation.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Web Scraping
  - Proxy
  - Data Aggregation
  - Data Collection
  - Browser Automation
url: >-
  https://raw.githubusercontent.com/api-evangelist/bright-data/refs/heads/main/apis.yml
created: '2026-03-26'
modified: '2026-03-26'
specificationVersion: '0.19'
apis:
  - aid: bright-data:web-scraper-api
    name: Bright Data Web Scraper API
    description: >-
      The Web Scraper API provides structured data extraction from websites
      with built-in proxy rotation, JavaScript rendering, CAPTCHA solving,
      and anti-bot bypass. Supports bulk request handling, data discovery,
      and automated validation backed by residential proxies.
    humanURL: https://brightdata.com/products/web-scraper
    tags:
      - Web Scraping
      - Data Extraction
      - Structured Data
    properties:
      - type: Documentation
        url: https://docs.brightdata.com
  - aid: bright-data:scraping-browser-api
    name: Bright Data Scraping Browser API
    description: >-
      The Scraping Browser API provides fully managed cloud browsers for
      browser-based data collection workflows requiring full page rendering,
      user-like interactions, and advanced unblocking. Integrates with
      Selenium, Puppeteer, and Playwright.
    humanURL: https://brightdata.com/products/scraping-browser
    tags:
      - Browser Automation
      - Headless Browser
      - Scraping
    properties:
      - type: Documentation
        url: https://docs.brightdata.com/scraping-automation/scraping-browser/introduction
  - aid: bright-data:proxy-api
    name: Bright Data Proxy API
    description: >-
      The Proxy API allows you to programmatically interact with and control
      Bright Data proxy networks including datacenter, residential, ISP, and
      mobile proxies. Automate creating, updating, and managing proxy ports
      and configurations.
    humanURL: https://brightdata.com/products/proxy-api
    tags:
      - Proxy
      - Residential Proxy
      - Datacenter Proxy
    properties:
      - type: Documentation
        url: https://docs.brightdata.com
